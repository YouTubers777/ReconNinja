name: ReconNinja CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python setup ──────────────────────────────────────────────────────
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      # ── 3. Install dependencies ──────────────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install rich pytest flake8

      # ── 4. Lint — hard fail on syntax errors & undefined names ───────────────
      - name: Lint with flake8 (errors only)
        run: |
          flake8 . \
            --count \
            --select=E9,F63,F7,F82 \
            --show-source \
            --statistics \
            --exclude=.git,__pycache__,reports

      # ── 5. Lint — soft warnings (won't fail the build) ──────────────────────
      - name: Lint with flake8 (warnings)
        run: |
          flake8 . \
            --count \
            --exit-zero \
            --max-complexity=10 \
            --max-line-length=127 \
            --statistics \
            --exclude=.git,__pycache__,reports

      # ── 6. Run tests ─────────────────────────────────────────────────────────
      - name: Run pytest
        run: |
          pytest tests/ -v --tb=short
