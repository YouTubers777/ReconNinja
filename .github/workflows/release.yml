name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to create GitHub releases
      id-token: write   # needed for PyPI trusted publishing

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python setup ─────────────────────────────────────────────────────
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      # ── 3. Install deps & run tests before releasing ─────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install rich pytest build twine

      - name: Run tests (must pass before release)
        run: pytest tests/ -v --tb=short

      # ── 4. Build PyPI package & publish ──────────────────────────────────────
      - name: Build PyPI package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

      # ── 5. Build the release zip ─────────────────────────────────────────────
      - name: Build release zip
        run: |
          # Get the tag name e.g. v5.0.0
          TAG="${GITHUB_REF_NAME}"

          # Create a clean staging folder named ReconNinja-<tag>
          STAGING="ReconNinja-${TAG}"
          mkdir -p "${STAGING}"

          # Copy all tool files — exclude git, cache, reports, and CI internals
          rsync -av \
            --exclude='.git' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.pytest_cache' \
            --exclude='reports/' \
            --exclude='*.egg-info' \
            --exclude="${STAGING}" \
            . "${STAGING}/"

          # Zip it
          ZIP_NAME="ReconNinja-${TAG}.zip"
          zip -r "${ZIP_NAME}" "${STAGING}/"
          echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV
          echo "TAG=${TAG}" >> $GITHUB_ENV

          # Show contents for log
          echo "--- Release zip contents ---"
          unzip -l "${ZIP_NAME}"

      # ── 6. Extract changelog for this version ────────────────────────────────
      - name: Extract changelog entry
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Pull the section between this tag and the next heading
          python3 - << 'PYEOF'
          import re, os

          tag = os.environ["GITHUB_REF_NAME"]          # e.g. v5.0.0
          version = tag.lstrip("v")                    # e.g. 5.0.0

          try:
              readme = open("CHANGELOG.md").read()
              # Match section starting with ## [version] or ## v[version]
              pattern = rf"(?m)^##\s+\[?v?{re.escape(version)}\]?.*?\n(.*?)(?=\n^##\s|\Z)"
              m = re.search(pattern, readme, re.DOTALL)
              notes = m.group(1).strip() if m else f"Release {tag}"
          except Exception:
              notes = f"ReconNinja {tag}"

          with open("/tmp/release_notes.md", "w") as f:
              f.write(notes)
          print("Release notes written:")
          print(notes[:500])
          PYEOF

      # ── 7. Create GitHub Release and upload zip ──────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "ReconNinja ${{ github.ref_name }}"
          body_path: /tmp/release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          files: ${{ env.ZIP_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
